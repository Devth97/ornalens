name: Deploy to Vercel

on:
  push:
    branches: [master]
    paths:
      - 'web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy web to Vercel (production)
        working-directory: web
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
